spring:
  application:
    name: susuggang
  profiles:
    default: local       # 프로파일 미지정(IDE 실행·테스트) = local, 운영은 컴포즈가 prod 지정
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: susuggang-order
      auto-offset-reset: earliest    # 그룹이 처음 붙으면 맨 앞부터 (데모에서 발행분 안 놓치게)
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
  jpa:
    hibernate:
      ddl-auto: update     # @Entity 보고 테이블 자동 생성

toss:
  base-url: https://api.tosspayments.com
  # 기본값 = 토스 문서에 공개된 테스트 키(비밀 아님) — 본인 키 발급 후엔 TOSS_SECRET_KEY 환경변수로 교체
