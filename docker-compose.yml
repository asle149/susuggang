services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # 컨테이너 기본 TZ는 UTC — LocalDateTime(expiresAt)이 브라우저(KST)와 어긋나지 않게 고정
      TZ: Asia/Seoul
      # 접속 정보는 application-prod.yml로 이동 — 여기는 프로파일 선택 + 시크릿만
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./logs:/var/log/susuggang   # JSON 로그 파일을 호스트에서 확인 (ELK가 가져갈 자리)
    depends_on:
      postgres:
        condition: service_healthy   # "떴다"가 아니라 "접속 받는다"까지 대기
      kafka:
        condition: service_started   # 카프카는 스프링이 알아서 재접속하므로 기동만 기다림

  postgres:
    image: postgres:16-alpine
    # brew Postgres(5432)와 충돌하지 않게 5433으로 노출 — IDE에서 컨테이너 DB 확인용
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: susuggang
      POSTGRES_USER: susuggang
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U susuggang -d susuggang"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: apache/kafka:3.9.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      # 이중 리스너: 호스트는 localhost:9092, 컨테이너는 kafka:19092
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:19092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      # 단일 브로커라 내부 토픽 복제 계수를 1로
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  kafka-ui:
    image: kafbat/kafka-ui:latest
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: susuggang-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
    depends_on:
      - kafka

volumes:
  pgdata:
